<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Web Code Grabber Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Consolas', monospace; background: #0a0a0a; color: #00ff00; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #111; border: 1px solid #00ff00; padding: 30px; border-radius: 5px; width: 100%; max-width: 600px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 20px 0; background: #000; border: 1px solid #00ff00; color: #00ff00; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00cc00; box-shadow: 0 0 10px #00ff00; }
        #status { margin-top: 20px; font-size: 12px; height: 150px; overflow-y: auto; border-top: 1px solid #333; padding-top: 10px; color: #aaa; }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
    </style>
</head>
<body>

<div class="box">
    <h2>[ WEB CLONER V5 ]</h2>
    <input type="text" id="targetUrl" placeholder="Masukkan URL Target (https://...)" value="https://">
    <button onclick="grabAllCode()">AMBIL SEMUA KODE & ZIP</button>
    <div id="status">Status: Menunggu instruksi...</div>
</div>

<script>
    const statusDiv = document.getElementById('status');
    const log = (msg, type = '') => {
        statusDiv.innerHTML += `<div class="${type}">> ${msg}</div>`;
        statusDiv.scrollTop = statusDiv.scrollHeight;
    };

    async function fetchProxy(url) {
        // Menggunakan AllOrigins Proxy
        const proxy = "https://api.allorigins.win/get?url=";
        const res = await fetch(proxy + encodeURIComponent(url));
        const data = await res.json();
        return data.contents;
    }

    async function grabAllCode() {
        const url = document.getElementById('targetUrl').value.trim();
        if (!url || url === "https://") return alert("Masukkan URL Target!");

        statusDiv.innerHTML = "";
        log("Memulai proses kloning...");
        
        const zip = new JSZip();
        const baseUrl = new URL(url);

        try {
            // 1. Ambil HTML Utama
            log("Mengambil index.html...");
            const html = await fetchProxy(url);
            if (!html) throw new Error("Gagal mengambil HTML.");
            zip.file("index.html", html);
            log("index.html tersimpan.", "success");

            // 2. Parsing untuk mencari CSS dan JS
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            const links = [];

            // Cari CSS
            doc.querySelectorAll('link[rel="stylesheet"]').forEach(el => {
                const href = el.getAttribute('href');
                if (href) links.push({ type: 'css', url: new URL(href, baseUrl).href });
            });

            // Cari JS
            doc.querySelectorAll('script[src]').forEach(el => {
                const src = el.getAttribute('src');
                if (src) links.push({ type: 'js', url: new URL(src, baseUrl).href });
            });

            log(`Menemukan ${links.length} file pendukung (CSS/JS).`);

            // 3. Download aset satu per satu
            for (let item of links) {
                try {
                    const content = await fetchProxy(item.url);
                    const name = item.url.split('/').pop().split('?')[0] || `file.${item.type}`;
                    zip.file(`${item.type}/${name}`, content);
                    log(`Downloaded: ${name}`, "success");
                } catch (e) {
                    log(`Gagal ambil: ${item.url}`, "error");
                }
            }

            // 4. Generate & Force Download
            log("Membungkus menjadi file ZIP...");
            const blob = await zip.generateAsync({type: "blob"});
            saveAs(blob, "proyek_1.zip");
            
            log("SELESAI! File 'proyek_1.zip' berhasil diunduh.", "success");

        } catch (err) {
            log("FATAL ERROR: " + err.message, "error");
        }
    }
</script>

</body>
</html>
