<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Tester</title>

<style>
body{
    background:#0f0f0f;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:340px;
    background:#1c1c1c;
    padding:20px;
    border-radius:16px;
}

input, textarea, button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    background:#5865f2;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

#log{
    margin-top:10px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="box">
    <h2>API Tester</h2>

    <input type="text" id="url" placeholder="Endpoint URL">

    <textarea id="message" placeholder="Pesan"></textarea>

    <input type="number" id="count" placeholder="Jumlah kirim (max 5)" max="5">

    <input type="number" id="delay" placeholder="Delay ms (contoh 1000)">

    <button onclick="startSend()">Mulai</button>

    <div id="log"></div>
</div>

<script>
function wait(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function startSend(){

    const url = document.getElementById("url").value;
    const message = document.getElementById("message").value;
    const count = Math.min(
        parseInt(document.getElementById("count").value || 1),
        5
    );

    const delay = parseInt(
        document.getElementById("delay").value || 1000
    );

    const log = document.getElementById("log");

    log.innerHTML = "";

    for(let i=1; i<=count; i++){

        try{

            const res = await fetch(url,{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({
                    message: message
                })
            });

            log.innerHTML += `Kirim ${i}: ${res.status}<br>`;

        }catch(err){

            log.innerHTML += `Error ${i}: ${err.message}<br>`;
        }

        await wait(delay);
    }

    log.innerHTML += "<br>Selesai.";
}
</script>

</body>
</html>
