<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Web Mirror Pro - ZIP Archiver</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d0d0d; color: #00ff00; padding: 20px; }
        .container { border: 1px solid #00ff00; padding: 20px; max-width: 600px; margin: auto; box-shadow: 0 0 15px #00ff00; }
        input { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #00ff00; color: #00ff00; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #00ff00; color: #000; border: none; cursor: pointer; font-weight: bold; }
        #console { margin-top: 20px; height: 200px; overflow-y: auto; font-size: 12px; border-top: 1px solid #333; padding-top: 10px; }
        .error { color: #ff0000; }
    </style>
</head>
<body>

<div class="container">
    <h3>[ PROJECT CLONER V2 ]</h3>
    <input type="text" id="targetUrl" placeholder="https://target-website.com">
    <button onclick="cloneProject()">GRAB & ZIP PROJECT</button>
    <div id="console">Status: Ready...</div>
</div>

<script>
    const log = (msg, isError = false) => {
        const c = document.getElementById('console');
        c.innerHTML += `<div class="${isError ? 'error' : ''}">> ${msg}</div>`;
        c.scrollTop = c.scrollHeight;
    };

    async function fetchData(url) {
        const proxy = "https://api.allorigins.win/get?url=";
        const res = await fetch(proxy + encodeURIComponent(url));
        const data = await res.json();
        return data.contents;
    }

    async function cloneProject() {
        const url = document.getElementById('targetUrl').value.trim();
        if (!url) return alert("Link-nya mana?");
        
        document.getElementById('console').innerHTML = "";
        log("Memulai koneksi ke target...");
        
        const zip = new JSZip();
        const base = new URL(url);

        try {
            // 1. Ambil HTML Utama
            const html = await fetchData(url);
            if(!html) throw new Error("Gagal ambil HTML utama.");
            zip.file("index.html", html);
            log("index.html berhasil ditarik.");

            // 2. Parsing Aset (CSS & JS Sederhana)
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            const assets = [];

            // Cari link CSS
            doc.querySelectorAll('link[rel="stylesheet"]').forEach(el => {
                if(el.href) assets.push({ type: 'css', url: new URL(el.getAttribute('href'), base).href });
            });

            // Cari script JS
            doc.querySelectorAll('script[src]').forEach(el => {
                if(el.src) assets.push({ type: 'js', url: new URL(el.getAttribute('src'), base).href });
            });

            log(`Menemukan ${assets.length} aset potensial. Mencoba mengunduh...`);

            // 3. Download Aset satu per satu
            for (let asset of assets) {
                try {
                    const content = await fetchData(asset.url);
                    const fileName = asset.url.split('/').pop() || (asset.type === 'css' ? 'style.css' : 'script.js');
                    zip.file(`${asset.type}/${fileName}`, content);
                    log(`Downloaded: ${fileName}`);
                } catch (e) {
                    log(`Gagal ambil: ${asset.url}`, true);
                }
            }

            // 4. Generate ZIP
            log("Membungkus semua file ke proyek_1.zip...");
            const blob = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "proyek_1.zip";
            a.click();
            log("Selesai! Cek folder download kamu.");

        } catch (err) {
            log("Fatal Error: " + err.message, true);
        }
    }
</script>
</body>
</html>
