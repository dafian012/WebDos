<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Web Mirror - GitHub Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; padding: 30px; }
        .container { background: #161b22; border: 1px solid #30363d; padding: 25px; border-radius: 10px; width: 100%; max-width: 500px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h2 { color: #58a6ff; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #0d1117; border: 1px solid #30363d; color: #58a6ff; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #238636; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; }
        button:hover { background: #2ea043; }
        #status-log { margin-top: 20px; background: #010409; padding: 15px; height: 160px; overflow-y: auto; border-radius: 6px; font-family: 'Cascadia Code', monospace; font-size: 12px; color: #7ee787; border: 1px solid #30363d; }
    </style>
</head>
<body>

<div class="container">
    <h2>Project Archiver v8</h2>
    <input type="text" id="target" placeholder="https://target-website.com" value="https://">
    <button onclick="startProcess()">GRAB ALL CODE</button>
    <div id="status-log">Ready to deploy...</div>
</div>

<script>
    const log = (msg) => {
        const div = document.getElementById('status-log');
        div.innerHTML += `<div>> ${msg}</div>`;
        div.scrollTop = div.scrollHeight;
    };

    async function fetchViaProxy(url) {
        // Menggunakan AllOrigins dengan cache-busting agar GitHub tidak memblokir
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&timestamp=${Date.now()}`;
        const res = await fetch(proxy);
        if (!res.ok) throw new Error("Proxy Error");
        const json = await res.json();
        return json.contents;
    }

    async function startProcess() {
        const url = document.getElementById('target').value.trim();
        if (!url || url === "https://") return alert("Masukkan URL!");

        document.getElementById('status-log').innerHTML = "";
        log("Menghubungi server target...");

        const zip = new JSZip();
        const baseUrl = new URL(url);

        try {
            // Ambil HTML
            log("Mencoba bypass CORS...");
            const html = await fetchViaProxy(url);
            if (!html) throw new Error("Web target menolak akses script.");
            
            zip.file("index.html", html);
            log("Index.html berhasil diamankan.");

            // Ambil CSS & JS Dasar
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            const assets = [...doc.querySelectorAll('link[rel="stylesheet"], script[src]')];

            log(`Ditemukan ${assets.length} file pendukung.`);

            for (let asset of assets.slice(0, 10)) { // Limit 10 file biar gak crash di browser HP
                let assetUrl = asset.getAttribute('href') || asset.getAttribute('src');
                if (assetUrl && !assetUrl.startsWith('http')) {
                    assetUrl = new URL(assetUrl, baseUrl).href;
                }

                try {
                    const content = await fetchViaProxy(assetUrl);
                    const name = assetUrl.split('/').pop().split('?')[0] || "script.js";
                    zip.file("code/" + name, content);
                    log(`OK: ${name}`);
                } catch (e) {
                    log(`SKIP: ${assetUrl}`);
                }
            }

            log("Membungkus ke .zip...");
            const blob = await zip.generateAsync({type: "blob"});
            
            // Menggunakan saveAs dari FileSaver.js
            saveAs(blob, "proyek_1.zip");
            log("SELESAI! Cek folder download.");

        } catch (err) {
            log("FAILED: " + err.message);
            log("Coba pakai link lain (Target mungkin pakai Cloudflare).");
        }
    }
</script>

</body>
</html>
