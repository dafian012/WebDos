<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dafian Checker Bio</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body { background:#f5f5f5; padding:20px; max-width:650px; margin:0 auto; }
        .card { background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 6px #0002; margin-bottom:16px; }
        h2 { color:#222; margin-bottom:15px; text-align:center; }
        input, textarea { width:100%; padding:10px; margin:8px 0 15px; border:1px solid #ddd; border-radius:4px; }
        button { width:100%; padding:11px; background:#2563eb; color:#fff; border:none; border-radius:4px; font-size:16px; cursor:pointer; }
        button:disabled { background:#94a3b8; cursor:not-allowed; }
        .info { background:#e8f0fe; padding:12px; border-radius:4px; margin:10px 0; text-align:center; font-weight:bold; }
        .peringatan { color:#dc2626; text-align:center; font-weight:bold; margin:10px 0; }
        .hasil { background:#111; color:#0f0; padding:15px; border-radius:4px; white-space:pre-wrap; max-height:450px; overflow-y:auto; font-family:monospace; font-size:13px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📋 Dafian Checker Bio</h2>
        <p class="peringatan">⚠️ Wajib Tautkan Nomor Dulu Sebelum Cek</p>

        <label>Nomor HP (contoh: +628123456789):</label>
        <input type="text" id="nomorAkun" placeholder="+62...">
        <button onclick="mintaKode()">🔑 Dapatkan Kode Pairing</button>

        <div id="tampilanKode" class="info" style="display:none;"></div>
        <div id="statusKoneksi" style="margin:10px 0; text-align:center;"></div>
    </div>

    <div class="card">
        <h3>🔍 Masukkan Daftar Nomor</h3>
        <textarea id="daftarNomor" rows="5" placeholder="+628xxxx
+628xxxx
..."></textarea>
        <button onclick="mulaiCek()" id="tombolCek" disabled>🚀 Mulai Cek</button>
        <br><br>
        <button onclick="unduhTeks()" id="tombolUnduh" style="background:#10b981; display:none;">📥 Unduh Hasil (.txt)</button>
    </div>

    <div class="card">
        <h3>📄 Hasil</h3>
        <div class="hasil" id="areaHasil">Belum ada data...</div>
    </div>

    <script>
        let terhubung = false;
        let teksHasil = "";

        async function mintaKode() {
            const nomor = document.getElementById("nomorAkun").value.trim();
            if (!nomor) return alert("Isi nomor dulu pakai format +62...");

            document.getElementById("tampilanKode").style.display = "none";
            document.getElementById("statusKoneksi").innerHTML = "⏳ Memproses... Mohon tunggu";

            try {
                const res = await fetch("/api/check", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ aksi: "dapatkan_kode", nomor: nomor })
                });
                const data = await res.json();

                if (data.berhasil) {
                    document.getElementById("tampilanKode").innerHTML = `KODE PAIRING: <br><strong style="font-size:22px; letter-spacing:3px;">${data.kode}</strong><br><br>Salin & buka WA > Setelan > Perangkat Tertaut > Tautkan Perangkat > Gunakan kode ini`;
                    document.getElementById("tampilanKode").style.display = "block";
                    cekStatusSetiapDetik();
                } else {
                    document.getElementById("statusKoneksi").innerHTML = `❌ ${data.pesan}`;
                }
            } catch {
                document.getElementById("statusKoneksi").innerHTML = "❌ Gagal terhubung ke server";
            }
        }

        async function cekStatusSetiapDetik() {
            const interval = setInterval(async () => {
                const res = await fetch("/api/check", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ aksi: "cek_koneksi" })
                });
                const data = await res.json();

                if (data.terhubung) {
                    clearInterval(interval);
                    terhubung = true;
                    document.getElementById("statusKoneksi").innerHTML = "✅ Berhasil Tertaut! Status: Online";
                    document.getElementById("tombolCek").disabled = false;
                }
            }, 2500);
        }

        async function mulaiCek() {
            if (!terhubung) return alert("⚠️ Belum terhubung!");
            const list = document.getElementById("daftarNomor").value.trim().split("\n").map(n => n.trim()).filter(n => n);
            if (list.length < 1) return alert("Masukkan nomor dulu!");

            const mulai = Date.now();
            document.getElementById("areaHasil").innerText = "🔍 Sedang memeriksa...";

            const res = await fetch("/api/check", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ aksi: "proses_cek", nomor_list: list })
            });
            const hasil = await res.json();
            const durasi = ((Date.now() - mulai)/1000).toFixed(1);

            teksHasil = formatLaporan(hasil, durasi);
            document.getElementById("areaHasil").innerText = teksHasil;
            document.getElementById("tombolUnduh").style.display = "block";
        }

        function formatLaporan(data, detik) {
            const m = Math.floor(detik/60);
            const d = (detik%60).toFixed(1);
            const waktu = new Date().toLocaleString("id-ID");

            return `「 📋 HASIL CEK BIO WHATSAPP 」

👤 Request   : Pengguna Web
🎯 Mode      : 🔢 Mode Urutan
━━━━━━━━━━━━━━━━━━━━━━━━━━━
📊 Statistik:
├ Total Dicek       : ${data.stat.total}
├ Terdaftar         : ${data.stat.terdaftar}
├ Dengan Bio        : ${data.stat.bio_ada}
├ Tanpa Bio         : ${data.stat.bio_tidak}
└ Registered Final  : ${data.stat.terdaftar}

📱 Jenis Akun:
├ 📳 WA Business    : ${data.stat.bisnis}
└ 📳 WA Biasa       : ${data.stat.biasa}

🏅 Meta Business Tier:
├ ⭐ EXCLUSIVE (≥7)  : 0
├ 🟡 STANDARD (4–6)  : 0
└ 🔴 LOW (1–3)        : ${data.stat.bisnis}

⏱️ Eksekusi   : ${detik} detik (${m} Menit ${d} detik)
🕐 Waktu (WIB)  : ${waktu}

══════════════════════════════════════════════════════════
📱 DETAIL AKUN
══════════════════════════════════════════════════════════
${data.detail.join("\n\n")}

══════════════════════════════════════════════════════════
⚡ Engine   : Dafian Checker Bio
══════════════════════════════════════════════════════════`;
        }

        function unduhTeks() {
            const blob = new Blob([teksHasil], { type:"text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Hasil_Cek_WA_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
