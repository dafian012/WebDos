<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍜 ABSEN MAKAN MIE | REX-EYE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a1f2e 0%, #0a0a0f 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(20, 25, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            border: 1px solid rgba(255, 100, 50, 0.4);
            padding: 28px 22px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 20px rgba(255,80,40,0.2);
            transition: 0.3s;
        }

        h1 {
            font-size: 2.2rem;
            text-align: center;
            color: #ff884d;
            text-shadow: 0 0 5px #ff5500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        h1 span {
            font-size: 2.5rem;
        }

        .sub {
            text-align: center;
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 28px;
            border-bottom: 1px dashed #ff884d55;
            padding-bottom: 12px;
        }

        .stats {
            background: #0f0f1a;
            border-radius: 32px;
            padding: 18px;
            margin-bottom: 28px;
            text-align: center;
            border: 1px solid #ff884d33;
        }

        .stats p {
            font-size: 1rem;
            color: #ddd;
        }

        .stats .count {
            font-size: 3rem;
            font-weight: bold;
            color: #ffaa66;
            text-shadow: 0 0 8px #ff6600;
            margin: 8px 0;
        }

        .stats .remaining {
            font-size: 0.9rem;
            color: #ffaa66;
        }

        .warning {
            background: #2a1a0a;
            border-left: 5px solid #ff884d;
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 28px;
            font-size: 0.8rem;
            color: #ffcc99;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(95deg, #ff884d, #ff5500);
            border: none;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px black;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 24px;
            font-family: monospace;
            letter-spacing: 1px;
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            background: #555;
            transform: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .reset-btn {
            background: #2a2a3a;
            border: 1px solid #ff884d;
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .history {
            background: #0a0a12;
            border-radius: 28px;
            padding: 16px;
            max-height: 260px;
            overflow-y: auto;
        }

        .history h3 {
            color: #ffaa66;
            margin-bottom: 12px;
            font-size: 1.2rem;
            border-left: 4px solid #ff884d;
            padding-left: 12px;
        }

        .history ul {
            list-style: none;
        }

        .history li {
            background: #11121c;
            margin: 8px 0;
            padding: 10px 14px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 0.85rem;
            color: #ccc;
            border: 1px solid #2a2a3a;
        }

        .history .date {
            color: #ffaa66;
        }

        .empty {
            text-align: center;
            color: #666;
            padding: 20px;
            font-style: italic;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #444;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        <span>🍜</span> MIE ABSEN <span>🍥</span>
    </h1>
    <div class="sub">Makan mie seminggu 2x doang! Gaboleh lebih, tai.</div>

    <div class="stats">
        <p>📅 Minggu ini (Senin - Minggu)</p>
        <div class="count" id="mieCount">0</div>
        <p class="remaining" id="remainingText">Sisa kuota: 2 kali</p>
    </div>

    <div class="warning" id="warningMsg">
        ⚠️ Peraturan: Maksimal 2x seminggu. Jangan nakal!
    </div>

    <button id="absenBtn">🍜 ABSEN MAKAN MIE 🍜</button>
    <button id="resetWeekBtn" class="reset-btn">🔄 RESET MINGGU INI (force)</button>

    <div class="history">
        <h3>📋 RIWAYAT ABSEN MIE</h3>
        <ul id="historyList">
            <li class="empty">Belum ada riwayat. Gas makan mie!</li>
        </ul>
    </div>
    <footer>REX-EYE VOID | disimpan di local storage HP lu</footer>
</div>

<script>
    // KEY LOCAL STORAGE
    const STORAGE_KEY = "mie_absen_rexeye";
    
    // Fungsi dapetin awal minggu (Senin jam 00:00)
    function getStartOfWeek(date) {
        const d = new Date(date);
        const day = d.getDay(); // 0 minggu, 1 senin...
        const diffToMonday = (day === 0 ? -6 : 1 - day);
        d.setDate(d.getDate() + diffToMonday);
        d.setHours(0, 0, 0, 0);
        return d;
    }

    // Load data dari local storage
    function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
            return {
                records: [],  // array { dateISO, timestamp, weekStartISO }
                lastWeekStart: null
            };
        }
        try {
            return JSON.parse(raw);
        } catch(e) {
            return { records: [], lastWeekStart: null };
        }
    }

    // Simpan data
    function saveData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // Dapetin minggu sekarang (start of week ISO string)
    function getCurrentWeekStartISO() {
        return getStartOfWeek(new Date()).toISOString();
    }

    // Filter record berdasarkan minggu tertentu
    function getRecordsForWeek(records, weekStartISO) {
        return records.filter(rec => rec.weekStartISO === weekStartISO);
    }

    // Update UI semua
    function updateUI() {
        const data = loadData();
        const currentWeek = getCurrentWeekStartISO();
        const thisWeekRecords = getRecordsForWeek(data.records, currentWeek);
        const countThisWeek = thisWeekRecords.length;
        const remaining = Math.max(0, 2 - countThisWeek);
        
        // Update angka
        document.getElementById('mieCount').innerText = countThisWeek;
        const remainingText = document.getElementById('remainingText');
        if (remaining === 0) {
            remainingText.innerHTML = `❌ Kuota habis! Minggu depan lagi.`;
            remainingText.style.color = "#ff8866";
        } else {
            remainingText.innerHTML = `🍜 Sisa kuota: ${remaining} kali minggu ini`;
            remainingText.style.color = "#ffaa66";
        }
        
        // Enable/disable tombol absen
        const absenBtn = document.getElementById('absenBtn');
        if (countThisWeek >= 2) {
            absenBtn.disabled = true;
            absenBtn.innerText = "⛔ KUOTA HABIS MINGGU INI ⛔";
            document.getElementById('warningMsg').innerHTML = "⚠️ GOBLOK! Lu udah 2x makan mie minggu ini. Sabar dulu, mingdep lagi.";
        } else {
            absenBtn.disabled = false;
            absenBtn.innerText = "🍜 ABSEN MAKAN MIE 🍜";
            document.getElementById('warningMsg').innerHTML = "✅ Masih bisa absen. Gas makan mie, tapi jangan lebih 2x seminggu!";
        }
        
        // Render history (10 terakhir descending)
        const sortedRecords = [...data.records].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = '';
        if (sortedRecords.length === 0) {
            historyList.innerHTML = '<li class="empty">🍥 Belum makan mie? Ayo absen!</li>';
        } else {
            sortedRecords.forEach(rec => {
                const dateObj = new Date(rec.timestamp);
                const formattedDate = dateObj.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                const formattedTime = dateObj.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                const li = document.createElement('li');
                li.innerHTML = `<span class="date">🍜 ${formattedDate}, ${formattedTime}</span><span>Mie enak 🍥</span>`;
                historyList.appendChild(li);
            });
        }
    }
    
    // Fungsi absen (tambah record)
    function absenMie() {
        const data = loadData();
        const currentWeek = getCurrentWeekStartISO();
        const thisWeekRecords = getRecordsForWeek(data.records, currentWeek);
        
        if (thisWeekRecords.length >= 2) {
            alert("GABOLEH TAI! Udah 2x minggu ini. Sabar.");
            updateUI();
            return false;
        }
        
        // Tambah record
        const now = new Date();
        const newRecord = {
            dateISO: now.toISOString(),
            timestamp: now.getTime(),
            weekStartISO: currentWeek
        };
        data.records.push(newRecord);
        saveData(data);
        
        alert("🍜 ABSEN BERHASIL! Selamat makan mie. 🍜\nSisa kuota minggu ini: " + (1 - thisWeekRecords.length));
        updateUI();
        return true;
    }
    
    // Reset minggu ini (buat testing atau force)
    function resetCurrentWeek() {
        const data = loadData();
        const currentWeek = getCurrentWeekStartISO();
        const filteredRecords = data.records.filter(rec => rec.weekStartISO !== currentWeek);
        data.records = filteredRecords;
        saveData(data);
        alert("🔄 Reset minggu ini berhasil! Lu bisa absen mie lagi 2x.");
        updateUI();
    }
    
    // Auto cek pas midnight, update UI
    function checkWeekChange() {
        const data = loadData();
        const currentWeek = getCurrentWeekStartISO();
        // gak perlu action khusus, UI auto adjust dari records
        updateUI();
    }
    
    // Event binding
    document.getElementById('absenBtn').addEventListener('click', absenMie);
    document.getElementById('resetWeekBtn').addEventListener('click', resetCurrentWeek);
    
    // Inisialisasi pertama + interval cek tiap menit
    updateUI();
    setInterval(() => {
        checkWeekChange();
    }, 60000); // update tiap menit
    
    // Cek juga saat halaman fokus lagi
    window.addEventListener('focus', () => {
        updateUI();
    });
</script>
</body>
</html>
