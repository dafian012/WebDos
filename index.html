<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dafian Checker Bio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #f0f2f5; padding: 20px; max-width: 650px; margin: 0 auto; }
    .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px #0000001a; margin-bottom: 15px; }
    h2 { text-align: center; color: #2563eb; margin-bottom: 15px; }
    .info { background: #dbeafe; padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; margin: 10px 0; }
    .peringatan { color: #dc2626; font-weight: bold; text-align: center; margin: 10px 0; }
    input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; }
    button { width: 100%; padding: 11px; background: #2563eb; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .hasil { background: #111; color: #0f0; padding: 15px; border-radius: 4px; white-space: pre-wrap; max-height: 450px; overflow-y: auto; font-family: monospace; font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>📋 Dafian Checker Bio</h2>
    <p class="peringatan">⚠️ Cara pakai: Ketik format /pair 628xxxx di bawah ini</p>

    <label>🔗 Perintah Pairing:</label>
    <input type="text" id="perintah" placeholder="Contoh: /pair 628123456789">
    <button onclick="prosesPair()">Dapatkan Kode</button>

    <div id="tampilanKode" class="info" style="display: none;"></div>
    <div id="statusKoneksi" style="text-align:center; margin:10px 0;"></div>
  </div>

  <div class="card">
    <h3>🔍 Cek Nomor</h3>
    <label>Masukkan daftar nomor:</label>
    <textarea id="daftarNomor" rows="6" placeholder="+628xxxx
+628xxxx
..."></textarea>
    <button onclick="mulaiCek()" id="tombolCek" disabled>Mulai Cek</button>
    <button onclick="unduhHasil()" id="tombolUnduh" style="background:#10b981; display:none; margin-top:8px;">Unduh Hasil (.txt)</button>
  </div>

  <div class="card">
    <h3>📄 Hasil</h3>
    <div class="hasil" id="areaHasil">Belum ada data...</div>
  </div>

  <script>
    let terhubung = false;
    let teksHasil = "";

    async function prosesPair() {
      const teks = document.getElementById("perintah").value.trim();
      if (!teks.startsWith("/pair ")) {
        return alert("❌ Format salah! Gunakan: /pair 628xxxx");
      }

      const nomor = teks.replace("/pair ", "").trim();
      document.getElementById("statusKoneksi").innerHTML = "⏳ Memuat...";
      document.getElementById("tampilanKode").style.display = "none";

      const res = await fetch("/api/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ aksi: "pairing", nomor_input: nomor })
      });

      const data = await res.json();
      if (data.sukses) {
        if (data.kode) {
          document.getElementById("tampilanKode").innerHTML = `KODE PAIRING:<br><strong style="font-size:22px; letter-spacing:3px;">${data.kode}</strong>`;
          document.getElementById("tampilanKode").style.display = "block";
          cekKoneksiBerkala();
        } else {
          document.getElementById("statusKoneksi").innerHTML = "✅ Sudah terhubung!";
          terhubung = true;
          document.getElementById("tombolCek").disabled = false;
        }
      } else {
        document.getElementById("statusKoneksi").innerHTML = data.pesan;
      }
    }

    async function cekKoneksiBerkala() {
      const interval = setInterval(async () => {
        const res = await fetch("/api/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ aksi: "cek_status" })
        });
        const data = await res.json();
        if (data.terhubung) {
          clearInterval(interval);
          terhubung = true;
          document.getElementById("statusKoneksi").innerHTML = "✅ Berhasil terhubung! Status: Online";
          document.getElementById("tombolCek").disabled = false;
        }
      }, 2500);
    }

    async function mulaiCek() {
      if (!terhubung) return alert("⚠️ Harap pairing dulu!");
      const list = document.getElementById("daftarNomor").value.trim().split("\n").map(n => n.trim()).filter(Boolean);
      if (!list.length) return alert("Masukkan daftar nomor!");

      const mulai = Date.now();
      document.getElementById("areaHasil").innerText = "🔍 Sedang memeriksa...";

      const res = await fetch("/api/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ aksi: "proses_cek", daftar_nomor: list })
      });

      const data = await res.json();
      const durasi = ((Date.now() - mulai) / 1000).toFixed(1);
      teksHasil = buatLaporan(data, durasi);
      document.getElementById("areaHasil").innerText = teksHasil;
      document.getElementById("tombolUnduh").style.display = "block";
    }

    function buatLaporan(data, detik) {
      const m = Math.floor(detik / 60);
      const d = (detik % 60).toFixed(1);
      const waktu = new Date().toLocaleString("id-ID");

      return `「 📋 HASIL CEK BIO WHATSAPP 」

👤 Request   : Pengguna Web
🎯 Mode      : 🔢 Mode Urutan
━━━━━━━━━━━━━━━━━━━━━━━━━━━
📊 Statistik:
├ Total Dicek       : ${data.stat.total}
├ Terdaftar         : ${data.stat.terdaftar}
├ Dengan Bio        : ${data.stat.bio_ada}
├ Tanpa Bio         : ${data.stat.bio_tidak}
└ Registered Final  : ${data.stat.terdaftar}

📱 Jenis Akun:
├ 📳 WA Business    : ${data.stat.bisnis}
└ 📳 WA Biasa       : ${data.stat.biasa}

🏅 Meta Business Tier:
├ ⭐ EXCLUSIVE (≥7)  : 0
├ 🟡 STANDARD (4–6)  : 0
└ 🔴 LOW (1–3)        : ${data.stat.bisnis}

⏱️ Eksekusi   : ${detik} detik (${m} Menit ${d} detik)
🕐 Waktu (WIB)  : ${waktu}

══════════════════════════════════════════════════════════
📱 DETAIL AKUN
══════════════════════════════════════════════════════════
${data.detail.join("\n\n")}

══════════════════════════════════════════════════════════
⚡ Engine   : Dafian Checker Bio
══════════════════════════════════════════════════════════`;
    }

    function unduhHasil() {
      const blob = new Blob([teksHasil], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `Hasil_Cek_WA_${Date.now()}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
