<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dafian Checker Bio</title>
    <style>
        * { font-family: Arial, sans-serif; box-sizing: border-box; }
        body { background: #f0f2f5; padding: 20px; max-width: 700px; margin: auto; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px #0002; margin-bottom: 15px; }
        textarea, input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #2563eb; color: white; border: none; padding: 10px 16px; border-radius: 4px; cursor: pointer; font-size: 15px; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .hasil { white-space: pre-wrap; background: #111; color: #0f0; padding: 15px; border-radius: 4px; max-height: 500px; overflow-y: auto; font-family: monospace; }
        .peringatan { color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📋 Dafian Checker Bio WhatsApp</h2>
        <p class="peringatan">⚠️ WAJIB: Lakukan Pairing Code terlebih dahulu sebelum mengecek nomor</p>

        <h3>🔗 Langkah 1: Tautkan Akun</h3>
        <label>Nomor HP (dengan kode negara, contoh: +62812xxxx):</label>
        <input type="text" id="nomorAkun" placeholder="+628xxxxxxx">
        <button onclick="dapatkanKode()">Dapatkan Pairing Code</button>
        <p id="kodeTampil"></p>
        <button onclick="verifikasiKode()" id="btnVerif" disabled>Verifikasi Kode</button>
        <p id="statusKoneksi"></p>
    </div>

    <div class="box">
        <h3>🔍 Langkah 2: Cek Nomor</h3>
        <label>Masukkan daftar nomor (satu baris satu nomor):</label>
        <textarea id="daftarNomor" rows="6" placeholder="+62812xxxx
+62856xxxx
..."></textarea>
        <br>
        <button onclick="mulaiCek()">Mulai Cek</button>
        <button onclick="unduhHasil()" id="btnUnduh" style="display:none;">Unduh Hasil (.txt)</button>
    </div>

    <div class="box">
        <h3>📄 Hasil Pengecekan</h3>
        <div class="hasil" id="hasilArea">Belum ada data...</div>
    </div>

    <script>
        let hasilAkhir = "";
        let terhubung = false;

        async function dapatkanKode() {
            const nomor = document.getElementById("nomorAkun").value.trim();
            if (!nomor) return alert("Isi nomor terlebih dahulu!");
            document.getElementById("kodeTampil").innerText = "Memproses...";
            const res = await fetch("/api/check", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ aksi: "mintaKode", nomor })
            });
            const data = await res.json();
            if (data.sukses) {
                document.getElementById("kodeTampil").innerHTML = `Kode Pairing: <strong>${data.kode}</strong><br>Masukkan ke WhatsApp > Perangkat Tertaut > Tautkan Perangkat > Gunakan kode.`;
                document.getElementById("btnVerif").disabled = false;
            } else {
                document.getElementById("kodeTampil").innerText = `Gagal: ${data.pesan}`;
            }
        }

        async function verifikasiKode() {
            document.getElementById("statusKoneksi").innerText = "Memverifikasi...";
            const res = await fetch("/api/check", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ aksi: "cekKoneksi" })
            });
            const data = await res.json();
            if (data.terhubung) {
                terhubung = true;
                document.getElementById("statusKoneksi").innerHTML = "✅ Terhubung! Status: Online";
            } else {
                document.getElementById("statusKoneksi").innerHTML = "❌ Belum terhubung, coba lagi.";
            }
        }

        async function mulaiCek() {
            if (!terhubung) return alert("⚠️ Anda belum menautkan nomor, tidak bisa melanjutkan!");
            const teks = document.getElementById("daftarNomor").value.trim();
            if (!teks) return alert("Masukkan daftar nomor!");
            const nomorList = teks.split("\n").map(n => n.trim()).filter(Boolean);
            const mulai = Date.now();

            document.getElementById("hasilArea").innerText = "Memproses...";
            const res = await fetch("/api/check", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ aksi: "cekNomor", nomorList })
            });
            const data = await res.json();
            const durasi = ((Date.now() - mulai)/1000).toFixed(1);

            hasilAkhir = buatLaporan(data, durasi);
            document.getElementById("hasilArea").innerText = hasilAkhir;
            document.getElementById("btnUnduh").style.display = "inline-block";
        }

        function buatLaporan(data, durasi) {
            const { total, terdaftar, adaBio, tanpaBio, waBiasa, waBisnis, tierLow } = data.stat;
            const waktuMenit = Math.floor(durasi / 60);
            const waktuDetik = (durasi % 60).toFixed(1);

            return `「 📋 HASIL CEK BIO WHATSAPP 」

👤 Request   : Pengguna Web
🎯 Mode      : 🔢 Mode Urutan
━━━━━━━━━━━━━━━━━━━━━━━━━━━
📊 Statistik:
├ Total Dicek       : ${total}
├ Terdaftar         : ${terdaftar}
├ Dengan Bio        : ${adaBio}
├ Tanpa Bio         : ${tanpaBio}
└ Registered Final  : ${terdaftar}

📱 Jenis Akun:
├ 📳 WA Business    : ${waBisnis}
└ 📳 WA Biasa       : ${waBiasa}

🏅 Meta Business Tier:
├ ⭐ EXCLUSIVE (≥7)  : 0
├ 🟡 STANDARD (4–6)  : 0
└ 🔴 LOW (1–3)        : ${tierLow}

⏱️ Eksekusi   : ${durasi} detik (${waktuMenit} Menit ${waktuDetik} detik)
🕐 Waktu (WIB)  : ${new Date().toLocaleString("id-ID")}

══════════════════════════════════════════════════════════
📱 DETAIL AKUN
══════════════════════════════════════════════════════════
${data.detail.join("\n\n")}

══════════════════════════════════════════════════════════
⚡ Engine   : Dafian Checker Bio
══════════════════════════════════════════════════════════`;
        }

        function unduhHasil() {
            const blob = new Blob([hasilAkhir], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `hasil_cek_whatsapp_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
